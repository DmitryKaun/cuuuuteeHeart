<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #1a060c 0%, #0f0307 40%, #0a0204 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Georgia', 'Times New Roman', serif;
            cursor: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
            background: transparent !important;
        }

        .center-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        .big-heart {
            font-size: min(220px, 30vw);
            cursor: none;
            pointer-events: auto;
            filter: drop-shadow(0 0 45px rgba(255, 140, 170, 0.7)) drop-shadow(0 0 85px rgba(255, 140, 170, 0.4));
            position: relative;
            display: inline-block;
            line-height: 1;
            user-select: none;
            -webkit-user-select: none;
            transition: filter 0.4s ease;
        }

        .big-heart:hover {
            filter: drop-shadow(0 0 60px rgba(255, 140, 170, 0.95)) drop-shadow(0 0 110px rgba(255, 140, 170, 0.6)) drop-shadow(0 0 150px rgba(255, 160, 190, 0.3));
        }

        .big-heart.opening {
            pointer-events: none;
        }

        .hint-text {
            color: rgba(255, 180, 200, 0.8);
            font-size: clamp(0.9em, 2vw, 1.3em);
            letter-spacing: clamp(3px, 0.8vw, 7px);
            margin-top: clamp(20px, 4vw, 32px);
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
            text-shadow: 0 0 16px rgba(255, 160, 190, 0.5);
            animation: hintPulse 2.5s ease-in-out infinite;
            text-align: center;
        }

        .hint-text.hidden {
            opacity: 0;
            transform: translateY(14px);
            animation: none;
        }

        .meet-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin-top: clamp(180px, 28vw, 260px);
            color: rgba(255, 190, 210, 0);
            font-size: clamp(0.9em, 2.2vw, 1.4em);
            letter-spacing: clamp(2px, 0.6vw, 5px);
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 170, 195, 0);
            transition: all 0.8s ease 0.5s;
            white-space: nowrap;
            text-align: center;
            z-index: 10;
        }

        .meet-text.visible {
            color: rgba(255, 190, 210, 0.9);
            transform: translate(-50%, -50%);
            margin-top: clamp(180px, 28vw, 260px);
            text-shadow: 0 0 20px rgba(255, 170, 195, 0.7), 0 0 40px rgba(255, 150, 180, 0.4);
            animation: breatheMeet 3s ease-in-out infinite 0.8s;
        }

        .outline-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: min(420px, 70vw);
            height: min(390px, 65vw);
            pointer-events: none;
            z-index: 4;
            transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s, opacity 0.8s ease 0.4s;
            opacity: 0;
        }

        .outline-heart.visible {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            animation: breatheOutline 3s ease-in-out infinite 0.4s;
        }

        .outline-heart svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 30px rgba(248, 160, 184, 0.5)) drop-shadow(0 0 60px rgba(248, 160, 184, 0.3));
        }

        .corner-wrapper {
            position: absolute;
            z-index: 20;
            pointer-events: auto;
        }
        .corner-wrapper.top-left {
            top: clamp(15px, 3vw, 40px);
            left: clamp(15px, 3vw, 40px);
        }
        .corner-wrapper.top-right {
            top: clamp(15px, 3vw, 40px);
            right: clamp(15px, 3vw, 40px);
        }
        .corner-wrapper.bottom-left {
            bottom: clamp(15px, 3vw, 40px);
            left: clamp(15px, 3vw, 40px);
        }
        .corner-wrapper.bottom-right {
            bottom: clamp(15px, 3vw, 40px);
            right: clamp(15px, 3vw, 40px);
        }

        .corner-heart {
            font-size: clamp(24px, 5vw, 40px);
            cursor: none;
            pointer-events: auto;
            transition: filter 0.3s ease;
            filter: drop-shadow(0 0 12px rgba(255, 140, 170, 0.6)) drop-shadow(0 0 25px rgba(255, 140, 170, 0.3));
            display: block;
            user-select: none;
            -webkit-user-select: none;
        }

        .corner-heart:hover {
            filter: drop-shadow(0 0 20px rgba(255, 140, 170, 0.9)) drop-shadow(0 0 40px rgba(255, 140, 170, 0.6));
        }

        .corner-heart.stopped {
            animation: none;
        }

        .compliment {
            position: absolute;
            color: #fccdd8;
            font-size: clamp(0.7em, 1.5vw, 1.1em);
            letter-spacing: 1px;
            z-index: 19;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(252, 205, 216, 0.8), 0 0 30px rgba(248, 160, 184, 0.4);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            background: rgba(0,0,0,0.4);
            padding: clamp(4px, 0.8vw, 6px) clamp(10px, 2vw, 16px);
            border-radius: 20px;
            border: 1px solid rgba(248, 160, 184, 0.3);
        }
        .compliment.show {
            opacity: 1;
            transform: scale(1);
        }

        .top-left .compliment {
            top: clamp(35px, 7vw, 55px);
            left: clamp(30px, 6vw, 50px);
        }
        .top-right .compliment {
            top: clamp(35px, 7vw, 55px);
            right: clamp(30px, 6vw, 50px);
        }
        .bottom-left .compliment {
            bottom: clamp(35px, 7vw, 55px);
            left: clamp(30px, 6vw, 50px);
        }
        .bottom-right .compliment {
            bottom: clamp(35px, 7vw, 55px);
            right: clamp(30px, 6vw, 50px);
        }

        .custom-cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 28px;
            transform: translate(-50%, -50%);
            transition: font-size 0.2s ease, opacity 0.2s ease;
            filter: drop-shadow(0 0 10px rgba(255, 140, 170, 0.7));
            opacity: 0.9;
            line-height: 1;
        }

        .custom-cursor.hovering {
            font-size: 40px;
            filter: drop-shadow(0 0 20px rgba(255, 140, 170, 1)) drop-shadow(0 0 35px rgba(255, 140, 170, 0.6));
        }

        .custom-cursor.clicking {
            font-size: 22px;
            transition: font-size 0.1s ease;
        }

        .custom-cursor.hidden-default {
            opacity: 0;
        }

        @keyframes hintPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.9; }
        }

        @keyframes breatheMeet {
            0%, 100% { 
                text-shadow: 0 0 18px rgba(255, 170, 195, 0.6), 0 0 35px rgba(255, 150, 180, 0.3);
                opacity: 0.8;
            }
            25% {
                text-shadow: 0 0 38px rgba(255, 170, 195, 1), 0 0 75px rgba(255, 150, 180, 0.7), 0 0 110px rgba(255, 140, 170, 0.4);
                opacity: 1;
            }
            50% {
                text-shadow: 0 0 22px rgba(255, 170, 195, 0.65), 0 0 42px rgba(255, 150, 180, 0.35);
                opacity: 0.85;
            }
            75% {
                text-shadow: 0 0 35px rgba(255, 170, 195, 0.95), 0 0 65px rgba(255, 150, 180, 0.6), 0 0 100px rgba(255, 140, 170, 0.35);
                opacity: 0.95;
            }
        }

        @keyframes breatheOutline {
            0%, 100% {
                filter: drop-shadow(0 0 25px rgba(248, 160, 184, 0.4)) drop-shadow(0 0 50px rgba(248, 160, 184, 0.2));
                transform: translate(-50%, -50%) scale(1);
            }
            25% {
                filter: drop-shadow(0 0 45px rgba(248, 160, 184, 0.7)) drop-shadow(0 0 85px rgba(248, 160, 184, 0.4)) drop-shadow(0 0 110px rgba(248, 160, 184, 0.2));
                transform: translate(-50%, -50%) scale(1.05);
            }
            50% {
                filter: drop-shadow(0 0 28px rgba(248, 160, 184, 0.45)) drop-shadow(0 0 55px rgba(248, 160, 184, 0.25));
                transform: translate(-50%, -50%) scale(1);
            }
            75% {
                filter: drop-shadow(0 0 40px rgba(248, 160, 184, 0.65)) drop-shadow(0 0 75px rgba(248, 160, 184, 0.35)) drop-shadow(0 0 100px rgba(248, 160, 184, 0.15));
                transform: translate(-50%, -50%) scale(1.04);
            }
        }
    </style>
</head>
<body>
    <canvas id="sparkleCanvas"></canvas>

    <div class="custom-cursor" id="customCursor">💋</div>

    <div class="corner-wrapper top-left">
        <div class="corner-heart beating-corner" id="cornerHeart1" onclick="showCompliment(1)">💗</div>
        <div class="compliment" id="compliment1">Ты самая красивая 💗</div>
    </div>
    <div class="corner-wrapper top-right">
        <div class="corner-heart beating-corner" id="cornerHeart2" onclick="showCompliment(2)">💗</div>
        <div class="compliment" id="compliment2">Кристин, розовый тебе идёт больше, чем Габи Солис 💅🏻</div>
    </div>
    <div class="corner-wrapper bottom-left">
        <div class="corner-heart beating-corner" id="cornerHeart3" onclick="showCompliment(3)">💗</div>
        <div class="compliment" id="compliment3">Люблю слышать твой прекрасный голос 💖</div>
    </div>
    <div class="corner-wrapper bottom-right">
        <div class="corner-heart beating-corner" id="cornerHeart4" onclick="showCompliment(4)">💗</div>
        <div class="compliment" id="compliment4">Обожаю, когда ты улыбаешься 💕</div>
    </div>

    <div class="outline-heart" id="outlineHeart">
        <svg viewBox="0 0 100 92" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M50 88 C18 65 2 45 2 26 C2 11 14 2 28 2 C38 2 45 10 50 18 C55 10 62 2 72 2 C86 2 98 11 98 26 C98 45 82 65 50 88Z" 
                  stroke="rgba(248, 160, 184, 0.7)" 
                  stroke-width="2.5" 
                  fill="none"
                  stroke-linecap="round"
                  stroke-linejoin="round"/>
            <path d="M50 88 C18 65 2 45 2 26 C2 11 14 2 28 2 C38 2 45 10 50 18 C55 10 62 2 72 2 C86 2 98 11 98 26 C98 45 82 65 50 88Z" 
                  stroke="rgba(255, 200, 220, 0.3)" 
                  stroke-width="6" 
                  fill="none"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0.5"/>
        </svg>
    </div>

    <div class="center-container" id="centerContainer">
        <div class="big-heart" id="bigHeart" onclick="openHeart()">💗</div>
        <div class="hint-text" id="hintText">Нажми на меня!!!</div>
    </div>

    <div class="meet-text" id="meetText">Ты самая шикарная, Кристин 💗</div>

    <script>
        const cursorDiv = document.getElementById('customCursor');
        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;
        let targetX = cursorX;
        let targetY = cursorY;

        document.addEventListener('mousemove', (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
            cursorDiv.style.opacity = '0.9';
            cursorDiv.classList.remove('hidden-default');
        });

        document.addEventListener('mouseleave', () => {
            cursorDiv.classList.add('hidden-default');
        });

        document.addEventListener('mouseenter', () => {
            cursorDiv.classList.remove('hidden-default');
        });

        document.addEventListener('mousedown', () => {
            cursorDiv.classList.add('clicking');
        });

        document.addEventListener('mouseup', () => {
            cursorDiv.classList.remove('clicking');
        });

        document.querySelectorAll('.big-heart, .corner-heart').forEach(el => {
            el.addEventListener('mouseenter', () => cursorDiv.classList.add('hovering'));
            el.addEventListener('mouseleave', () => cursorDiv.classList.remove('hovering'));
        });

        function updateCursor() {
            cursorX += (targetX - cursorX) * 0.18;
            cursorY += (targetY - cursorY) * 0.18;
            cursorDiv.style.left = cursorX + 'px';
            cursorDiv.style.top = cursorY + 'px';
            requestAnimationFrame(updateCursor);
        }
        requestAnimationFrame(updateCursor);

        const canvas = document.getElementById('sparkleCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let sparkles = [];
        let animationId;
        
        const bigHeart = document.getElementById('bigHeart');
        const cornerHearts = document.querySelectorAll('.beating-corner');
        let mainBeating = true;
        let cornerBeating = [true, true, true, true];
        
        class Sparkle {
            constructor() {
                this.reset(true);
            }
            reset(initial = false) {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = 0.5 + Math.random() * 2;
                this.maxOpacity = 0.15 + Math.random() * 0.3;
                this.opacity = initial ? Math.random() * this.maxOpacity : 0;
                this.fadeSpeed = 0.003 + Math.random() * 0.008;
                this.fadingIn = Math.random() > 0.3;
                this.twinkleSpeed = 0.01 + Math.random() * 0.03;
                this.twinkleOffset = Math.random() * Math.PI * 2;
            }
            update(time) {
                if (this.fadingIn) {
                    this.opacity += this.fadeSpeed;
                    if (this.opacity >= this.maxOpacity) this.fadingIn = false;
                } else {
                    this.opacity -= this.fadeSpeed;
                    if (this.opacity <= 0) {
                        this.opacity = 0;
                        this.x = Math.random() * width;
                        this.y = Math.random() * height;
                        this.maxOpacity = 0.1 + Math.random() * 0.3;
                        this.fadingIn = true;
                    }
                }
            }
            draw(ctx, time) {
                if (this.opacity <= 0.01) return;
                let twinkle = Math.sin(time * this.twinkleSpeed + this.twinkleOffset) * 0.3 + 0.7;
                let alpha = this.opacity * twinkle;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 215, 235, ${alpha})`;
                ctx.fill();
            }
        }
        
        function initSparkles(count) {
            sparkles = [];
            for (let i = 0; i < count; i++) {
                sparkles.push(new Sparkle());
            }
        }
        
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            const sparkleCount = width < 600 ? 20 : 35;
            initSparkles(sparkleCount);
        }

        function getBeatScale(time, offset = 0) {
            const cycleDuration = 1600;
            const cycleTime = (time + offset) % cycleDuration;
            const progress = cycleTime / cycleDuration;
            
            if (progress < 0.15) {
                const p1 = progress / 0.15;
                return 1 + Math.sin(p1 * Math.PI) * 0.15;
            } else if (progress < 0.25) {
                return 1;
            } else if (progress < 0.4) {
                const p2 = (progress - 0.25) / 0.15;
                return 1 + Math.sin(p2 * Math.PI) * 0.15;
            } else {
                return 1;
            }
        }

        function updateHeartbeat(time) {
            if (mainBeating) {
                const scale = getBeatScale(time);
                bigHeart.style.transform = `scale(${scale})`;
            }
            
            cornerHearts.forEach((heart, index) => {
                if (cornerBeating[index]) {
                    const offset = index * 400;
                    const cornerScale = getBeatScale(time, offset);
                    heart.style.transform = `scale(${cornerScale})`;
                }
            });
        }
        
        function openHeart() {
            if (!mainBeating) return;
            
            mainBeating = false;
            bigHeart.style.transform = 'scale(1)';
            bigHeart.classList.add('opening');
            
            const hintText = document.getElementById('hintText');
            const meetText = document.getElementById('meetText');
            const outlineHeart = document.getElementById('outlineHeart');
            
            let startTime = null;
            const duration = 1200;
            
            function animateOpen(time) {
                if (!startTime) startTime = time;
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                const scale = 1 + progress * 1.5;
                const opacity = 1 - progress;
                
                bigHeart.style.transform = `scale(${scale})`;
                bigHeart.style.opacity = opacity;
                
                if (progress < 1) {
                    requestAnimationFrame(animateOpen);
                } else {
                    bigHeart.style.display = 'none';
                }
            }
            
            hintText.classList.add('hidden');
            requestAnimationFrame(animateOpen);
            
            setTimeout(() => {
                meetText.classList.add('visible');
            }, 400);
            
            setTimeout(() => {
                outlineHeart.classList.add('visible');
            }, 450);
        }

        function showCompliment(id) {
            const compliment = document.getElementById('compliment' + id);
            const heartIndex = id - 1;
            
            if (cornerBeating[heartIndex]) {
                cornerBeating[heartIndex] = false;
                const heart = document.getElementById('cornerHeart' + id);
                heart.style.transform = 'scale(1)';
            }
            
            if (compliment.classList.contains('show')) {
                compliment.classList.remove('show');
                setTimeout(() => {
                    compliment.classList.add('show');
                }, 100);
            } else {
                compliment.classList.add('show');
            }
        }
        
        function animate(time) {
            ctx.clearRect(0, 0, width, height);
            
            for (let sparkle of sparkles) {
                sparkle.update(time);
                sparkle.draw(ctx, time);
            }
            
            updateHeartbeat(time);
            
            animationId = requestAnimationFrame(animate);
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        document.getElementById('bigHeart').addEventListener('touchstart', function(e) {
            e.preventDefault();
            openHeart();
        });

        for (let i = 1; i <= 4; i++) {
            const heart = document.getElementById('cornerHeart' + i);
            if (heart) {
                heart.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    showCompliment(i);
                });
            }
        }
        
        requestAnimationFrame(animate);
    </script>
</body>
</html>
